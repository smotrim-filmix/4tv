<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>404</title>

<script>
(function () {

    let path = decodeURIComponent(window.location.pathname);

    // убираем первый слеш
    path = path.replace(/^\/+/, "");

    // если пусто — показываем крако
    if (!path) {
        document.body.innerHTML = "Xo?.4tv";
        return;
    }

    // убираем мусор после ? ! %
    let clean = path.split("?")[0]
                    .split("!")[0]
                    .split("%")[0];

    // добавляем .html
    if (!clean.endsWith(".html")) {
        clean += ".html";
    }

    // редирект
    window.location.replace("/" + clean);

})();
</script>

</head>

<body>
Xo?.4tv
</body>
</html>
